services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: profile_app_dev
    volumes:
      - ..:/var/www/html:cached
    ports:
      - "4240:8000"
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=profile_db
      - DB_USERNAME=profile_user
      - DB_PASSWORD=profile_password
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: profile_mysql_dev
    environment:
      MYSQL_DATABASE: profile_db
      MYSQL_USER: profile_user
      MYSQL_PASSWORD: profile_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "4241:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
