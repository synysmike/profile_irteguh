services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: profile_app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
            - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf
        networks:
            - profile_network
        depends_on:
            - mysql
        environment:
            - APP_ENV=local
            - DB_CONNECTION=mysql
            - DB_HOST=mysql
            - DB_PORT=3306
            - DB_DATABASE=profile_db
            - DB_USERNAME=profile_user
            - DB_PASSWORD=profile_password
            - PHP_FPM_LISTEN=0.0.0.0:9005

    web:
        image: nginx:stable
        container_name: profile_web
        volumes:
            - ./:/var/www/html:ro
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        ports:
            - "4240:80"
        networks:
            - profile_network
        depends_on:
            - app

    mysql:
        image: mysql:8.0
        container_name: profile_mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: profile_db
            MYSQL_USER: profile_user
            MYSQL_PASSWORD: profile_password
            MYSQL_ROOT_PASSWORD: root_password
        ports:
            - "4241:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - profile_network

volumes:
    mysql_data:

networks:
    profile_network:
