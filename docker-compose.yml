version: "3.8"

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: profile_app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        ports:
            - "4240:8000"
            - "443:443"
        environment:
            - APP_ENV=local
            - DB_CONNECTION=mysql
            - DB_HOST=mysql
            - DB_PORT=3306
            - DB_DATABASE=profile_db
            - DB_USERNAME=profile_user
            - DB_PASSWORD=profile_password
        depends_on:
            - mysql
        networks:
            - profile_network

    mysql:
        image: mysql:8.0
        container_name: profile_mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: profile_db
            MYSQL_USER: profile_user
            MYSQL_PASSWORD: profile_password
            MYSQL_ROOT_PASSWORD: root_password
        ports:
            - "4241:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - profile_network

networks:
    profile_network:
        driver: bridge

volumes:
    mysql_data:
        driver: local
