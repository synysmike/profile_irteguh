services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: profile_app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        networks:
            - profile_network
        depends_on:
            - mysql
        env_file:
            - .env

    web:
        image: nginx:stable
        container_name: profile_web
        volumes:
            - ./:/var/www/html:ro
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        ports:
            - "4240:80"
        networks:
            - profile_network
        depends_on:
            - app
        env_file:
            - .env

    mysql:
        image: mysql:8.0
        container_name: profile_mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: profile_db
            MYSQL_USER: profile_user
            MYSQL_PASSWORD: profile_password
            MYSQL_ROOT_PASSWORD: root_password
        ports:
            - "4241:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - profile_network
        env_file:
            - .env

volumes:
    mysql_data:

networks:
    profile_network:
